{
    "version": 8,
    "name": "QuakeJS",
    "fileformats": [
        { "format": "Standard" },
        { "format": "Valve" }
    ],
    "filesystem": {
        "searchpath": ".",
        "packageformat": { "format": "Id Pak", "extensions": [ "pak" ] }
    },
    "textures": {
        "root": "textures",
        "extensions": [ ".png", ".jpg", ".webp" ],
        "palette": "gfx/palette.lmp"
    },
    "entities": {
        "definitions": [ "quakejs.fgd", "props.fgd" ],
        "defaultcolor": "0.6 0.6 0.6 1.0",
        "modelformats": [ "mdl" ]
    },
    "tags": {
        "brush": [],
        "brushface": [
            {
                "name": "Trigger",
                "attribs": [ "transparent" ],
                "match": "texture",
                "pattern": "trigger"
            }
        ]
    },
    "faceattribs": {
        "surfaceflags": [],
        "contentflags": []
    }
}
