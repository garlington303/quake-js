<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babylon TrenchFPS</title>
    <style>
      /* ── Cinematic ratio ──────────────────────────────────────────────────
         Change --cinema-ratio to adjust the letterbox (2.39 = anamorphic scope).
         --bar-h is the height of each black bar; clamps to 0 on ultra-wide
         displays where the viewport is already wider than the target ratio.
      ──────────────────────────────────────────────────────────────────── */
      :root {
        --cinema-ratio: 2.39;
        --bar-h: max(0px, calc((100vh - 100vw / var(--cinema-ratio)) / 2));
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        font-family: "Segoe UI", sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      /* Letterbox bars — sit above the canvas, below the HUD */
      #app::before,
      #app::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        height: var(--bar-h);
        background: #000;
        z-index: 5;
        pointer-events: none;
      }
      #app::before { top: 0; }
      #app::after  { bottom: 0; }

      #renderCanvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

      .hud {
        position: absolute;
        /* Inset the HUD so elements live inside the cinematic frame */
        top: var(--bar-h);
        bottom: var(--bar-h);
        left: 0;
        right: 0;
        color: #e8edf2;
        pointer-events: none;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        z-index: 10;
      }

      /* ── Bottom taskbar: centres all panels in a row ── */
      .hud-taskbar {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: flex-end;
        gap: 16px;
      }

      .hud-vitals {
        position: absolute;
        top: 16px;
        left: 16px;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .hud-combat {
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        gap: 2px;
        min-width: 120px;
      }

      .hud-stat {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-bottom: 10px;
      }

      .hud-stat:last-child {
        margin-bottom: 0;
      }

      /* label + value on one line */
      .hud-stat-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
      }

      .hud-label {
        color: rgba(210, 190, 150, 0.85);
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.14em;
        text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.95);
      }

      .hud-value {
        font-size: 15px;
        font-weight: 700;
        color: #e8dfc0;
        text-shadow: 0 0 6px rgba(200, 140, 40, 0.35), 1px 1px 0 rgba(0,0,0,0.9);
      }

      .hud-bar {
        position: relative;
        width: 256px;
        height: 64px;
        background-size: 100% 100%;
        background-repeat: no-repeat;
        image-rendering: pixelated;
        margin-top: 2px;
        mix-blend-mode: screen;
      }

      .hud-bar-fill {
        position: absolute;
        left: 14px;
        top: 20px;
        height: 24px;
        width: calc(100% - 28px);
        background-image: url("/ui/hud_hp_fill.png?v=3");
        background-size: 100% 100%;
        image-rendering: pixelated;
        clip-path: inset(0 100% 0 0);
      }

      .hud-bar-fill.armor {
        background-image: url("/ui/hud_armor_fill.png?v=3");
      }

      .hud-bar.hp {
        background-image: url("/ui/hud_hp_bar.png?v=3");
      }

      .hud-bar.armor {
        background-image: url("/ui/hud_armor_bar.png?v=3");
      }

      .hud-ammo-panel {
        width: 140px;
        height: 140px;
        background-image: url("/ui/hud_ammo_panel.png?v=3");
        background-size: 100% 100%;
        background-repeat: no-repeat;
        image-rendering: pixelated;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0px;
        text-align: center;
        mix-blend-mode: screen;
      }

      .hud-ammo-label {
        font-size: 10px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(190, 160, 100, 0.9);
        text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.95);
      }

      .hud-ammo-value {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #f0e4c0;
        text-shadow: 0 0 12px rgba(210, 130, 30, 0.7), 1px 1px 0 rgba(0, 0, 0, 0.95);
        line-height: 1;
      }

      .hud-stat-inline {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        margin-bottom: 6px;
      }

      .hud-stat-inline:last-child {
        margin-bottom: 0;
      }

      .hud-status {
        color: rgba(190, 160, 100, 0.85);
        background: rgba(8, 6, 4, 0.82);
        border: 1px solid rgba(140, 90, 30, 0.45);
        border-radius: 2px;
        padding: 5px 14px;
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.9);
        white-space: nowrap;
      }

      .crosshair {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 32px;
        height: 32px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        opacity: 0.85;
        background: url("/ui/hud_crosshair.png?v=3") center/contain no-repeat;
        image-rendering: pixelated;
        mix-blend-mode: screen;
      }

      .crosshair.hit {
        opacity: 1;
        filter: drop-shadow(0 0 6px rgba(255, 80, 80, 0.8));
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="renderCanvas" aria-label="Babylon TrenchFPS render canvas"></canvas>
      <div id="crosshair" class="crosshair" aria-hidden="true"></div>
      <div id="hud" class="hud" aria-live="polite">

        <!-- Top-left: HP + Armor bars -->
        <div class="hud-vitals">
          <div class="hud-stat">
            <div class="hud-stat-row">
              <span class="hud-label">HP</span>
              <span class="hud-value" id="hud-health">100</span>
            </div>
            <div class="hud-bar hp"><div id="hud-health-bar" class="hud-bar-fill"></div></div>
          </div>
          <div class="hud-stat">
            <div class="hud-stat-row">
              <span class="hud-label">Armor</span>
              <span class="hud-value" id="hud-armor">0</span>
            </div>
            <div class="hud-bar armor"><div id="hud-armor-bar" class="hud-bar-fill armor"></div></div>
          </div>
        </div>

        <!-- Bottom-centre: Ammo + Combat -->
        <div class="hud-taskbar">
          <div class="hud-ammo-panel">
            <div class="hud-ammo-label">Ammo</div>
            <div class="hud-ammo-value" id="hud-ammo">&infin;</div>
          </div>
          <div class="hud-combat">
            <div class="hud-stat-inline"><span class="hud-label">Enemies</span><span class="hud-value" id="hud-enemies">0</span></div>
            <div class="hud-stat-inline"><span class="hud-label">Kills</span><span class="hud-value" id="hud-kills">0</span></div>
            <div class="hud-stat-inline"><span class="hud-label">Shots</span><span class="hud-value" id="hud-shots">0</span></div>
          </div>
        </div>

      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
  </html>
